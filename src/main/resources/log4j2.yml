Configuration:
  status: warn
  name: TelcoLogConfig

  Appenders:
    Console:
      name: Console_Appender
      target: SYSTEM_OUT
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"
    File:
      name: File_Appender
      fileName: logs/app.log
      PatternLayout:
        pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n"

  Loggers:
    Root:
      level: info
      AppenderRef:
        - ref: Console_Appender
        - ref: File_Appender
    Logger:
      - name: com.hacom.telco
        level: debug
        additivity: false
        AppenderRef:
          - ref: Console_Appender
          - ref: File_Appender
